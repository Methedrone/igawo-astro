<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <style>
      .stem { fill: #3D2B1F; }
      .dot { fill: #C9A227; }
      @media (prefers-color-scheme: dark) {
        .stem { fill: #F5F0E8; }
      }
    </style>
  </defs>
  <!-- Geometric i-mark: vertical pillar + golden dot -->
  <rect class="stem" x="38" y="28" width="24" height="60" rx="12" />
  <circle class="dot" cx="50" cy="16" r="12" />
</svg>