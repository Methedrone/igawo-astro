<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brak połączenia — igawo.pl</title>
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: 'Geist', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fdfcfa;
        color: #1c1917;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
      }
      .container {
        max-width: 28rem;
        width: 100%;
        text-align: center;
      }
      .logo {
        width: 3rem;
        height: 3rem;
        margin: 0 auto 1.5rem;
        color: #10b981;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: 1.2;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 1rem;
        line-height: 1.6;
        color: #57534e;
        margin-bottom: 2rem;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.625rem 1.25rem;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        border: none;
      }
      .btn:hover {
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn-primary {
        background: #10b981;
        color: #fff;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }
      .btn-primary:hover {
        background: #059669;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      .btn-secondary {
        background: #fff;
        color: #1c1917;
        border: 1px solid #e7e5e4;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }
      .btn-secondary:hover {
        border-color: #d6d3d1;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      .icon-wifi {
        width: 1.25rem;
        height: 1.25rem;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.2"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Brak połączenia z internetem</h1>
      <p>Wygląda na to, że utraciłeś połączenie. Niektóre strony mogą być niedostępne offline. Sprawdź swoje połączenie i spróbuj ponownie.</p>
      <div class="actions">
        <button class="btn btn-primary" onclick="window.location.reload()">
          <svg class="icon-wifi" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M1 4l4 4"/>
            <path d="M5 8l4 4"/>
            <path d="M9 12l4 4"/>
            <path d="M13 16l4 4"/>
            <path d="M17 20l4 4"/>
            <path d="M3 21h18"/>
          </svg>
          Spróbuj ponownie
        </button>
        <a href="/" class="btn btn-secondary">Strona główna</a>
      </div>
    </div>
  </body>
</html>
